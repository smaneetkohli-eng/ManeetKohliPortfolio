<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects Brainstorm</title>
    <link rel="stylesheet" href="css/styles.css?v=52" />
  </head>
  <body>
    <main class="page-stage" style="min-height: 100vh; display: grid; place-items: center; padding: 2rem;">
      <section class="glass-card" style="width: min(900px, 92vw); padding: 2rem;">
        <h1 class="projects-strip__title" style="margin-top: 0;">Projects Brainstorm</h1>
        <p class="projects-strip__placeholder">Use this blank page to collect ideas for future project highlights.</p>
        <textarea
          aria-label="Projects brainstorm notes"
          placeholder="Type ideas here..."
          style="width: 100%; min-height: 45vh; resize: vertical; background: rgba(0,0,0,0.25); color: rgba(255,255,255,0.92); border: 1px solid rgba(255,255,255,0.22); border-radius: 12px; padding: 1rem; font: 400 1rem/1.5 Inter, system-ui, sans-serif;"
        ></textarea>
      </section>
    </main>
  </body>
</html>
